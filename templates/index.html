<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
  <style>
    :root {
      --primary:      #1A62D4;
      --primary-c:    #D6E8FF;
      --primary-hov:  #145AB8;
      --on-primary:   #FFFFFF;
      --bg:           #F4F7FD;
      --surface:      #FFFFFF;
      --surf-v:       #EEF3FB;
      --surf-c:       #E3EDFB;
      --on-surface:   #181C23;
      --muted:        #5E6E87;
      --muted2:       #98A6BC;
      --outline:      #D3DCEC;
      --outline-v:    #EAF0F8;
      --green:        #1A7F52;
      --green-c:      #D3F4E5;
      --red:          #C0392B;
      --red-c:        #FDECEA;
      --orange:       #A65E0A;
      --orange-c:     #FFF3DC;
      --gray-c:       #EDF1F7;
      --mono:         'JetBrains Mono', monospace;
      --sans:         'Outfit', sans-serif;
      --display:      'Syne', sans-serif;
      --r-sm:         8px;
      --r-md:         12px;
      --r-lg:         16px;
      --sh0:          0 1px 2px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
      --sh1:          0 2px 6px rgba(26,98,212,.09), 0 6px 20px rgba(26,98,212,.07);
    }

    [data-theme="dark"] {
      --primary:      #5B9EFF;
      --primary-c:    rgba(91,158,255,.15);
      --primary-hov:  #7BB3FF;
      --on-primary:   #0D1726;
      --bg:           #0F1117;
      --surface:      #161B26;
      --surf-v:       #1C2333;
      --surf-c:       #1E2840;
      --on-surface:   #E2E8F4;
      --muted:        #7A8EAD;
      --muted2:       #4D607A;
      --outline:      #2A3650;
      --outline-v:    #1F2D44;
      --green:        #34D399;
      --green-c:      rgba(52,211,153,.12);
      --red:          #F87171;
      --red-c:        rgba(248,113,113,.12);
      --orange:       #FBBF24;
      --orange-c:     rgba(251,191,36,.12);
      --gray-c:       rgba(122,142,173,.1);
      --sh0:          0 1px 3px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --sh1:          0 3px 10px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--on-surface);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ───────────────────────────────────────── */
    .page { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Theme toggle ─────────────────────────────────── */
    .theme-toggle {
      margin-left: auto;
      background: var(--surf-v);
      border: 1px solid var(--outline-v);
      border-radius: 20px;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s, border-color .2s, color .2s;
      font-family: var(--sans);
      font-weight: 500;
    }
    .theme-toggle:hover { background: var(--surf-c); color: var(--on-surface); }
    .theme-toggle svg { flex-shrink: 0; }

    /* ── Header ───────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .hdr-mark {
      width: 44px;
      height: 44px;
      border-radius: var(--r-md);
      background: var(--primary-c);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hdr-mark svg { display: block; }
    .hdr-title {
      font-family: var(--display);
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.15;
      color: var(--on-surface);
    }
    .hdr-title span { color: var(--primary); }
    .hdr-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Section label ────────────────────────────────── */
    .slabel {
      font-family: var(--display);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Recent events ────────────────────────────────── */
    #recentSection { margin-bottom: 20px; }
    #recentCards { display: flex; flex-wrap: wrap; gap: 8px; }

    .rc {
      background: var(--surface);
      border: 1px solid var(--outline-v);
      border-radius: var(--r-md);
      padding: 12px 15px;
      cursor: pointer;
      transition: box-shadow .18s, border-color .2s, transform .16s;
      min-width: 180px;
      max-width: 280px;
      box-shadow: var(--sh0);
    }
    .rc:hover {
      border-color: var(--primary-c);
      box-shadow: var(--sh1);
      transform: translateY(-1px);
    }
    .rc-name {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .rc-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .rc-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-c);
      border-radius: 20px;
      padding: 2px 8px;
      margin-right: 4px;
    }

    /* ── Input panel ──────────────────────────────────── */
    .panel {
      background: var(--surface);
      border-radius: var(--r-lg);
      border: 1px solid var(--outline-v);
      box-shadow: var(--sh0);
      padding: 20px 22px;
      margin-bottom: 12px;
    }
    .fields { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .f { display: flex; flex-direction: column; gap: 5px; }
    .f-url  { flex: 1 1 280px; }
    .f-num  { flex: 0 0 100px; }
    .f label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
      color: var(--muted);
    }
    .f input {
      background: var(--bg);
      border: 1.5px solid var(--outline);
      border-radius: var(--r-sm);
      color: var(--on-surface);
      font-family: var(--sans);
      font-size: 13.5px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .15s;
      width: 100%;
    }
    .f input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,98,212,.12);
      background: var(--surface);
    }
    .f input::placeholder { color: var(--muted2); }
    .f input[type=number] { -moz-appearance: textfield; }
    .f input[type=number]::-webkit-outer-spin-button,
    .f input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn-primary-custom {
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 20px;
      font-family: var(--display);
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: .02em;
      padding: 9px 26px;
      cursor: pointer;
      height: 38px;
      transition: background .16s, box-shadow .18s;
      white-space: nowrap;
    }
    .btn-primary-custom:hover:not(:disabled) {
      background: var(--primary-hov);
      box-shadow: 0 3px 10px rgba(26,98,212,.28);
    }
    .btn-primary-custom:disabled { opacity: .4; cursor: not-allowed; }

    .btn-stop {
      background: transparent;
      color: var(--red);
      border: 1.5px solid rgba(192,57,43,.28);
      border-radius: 20px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      height: 38px;
      transition: background .15s, border-color .15s;
    }
    .btn-stop:hover { background: var(--red-c); border-color: var(--red); }

    #errorMsg {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--red-c);
      border: 1px solid rgba(192,57,43,.22);
      border-radius: var(--r-sm);
      font-size: 12.5px;
      color: var(--red);
    }

    /* ── Progress ─────────────────────────────────────── */
    #progressSection {
      background: var(--surface);
      border: 1px solid var(--outline-v);
      border-radius: var(--r-lg);
      box-shadow: var(--sh0);
      padding: 16px 22px;
      margin-bottom: 12px;
    }
    .prog-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #progressLabel {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .02em;
    }
    #foundLabel {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--primary);
    }
    .prog-track {
      height: 5px;
      background: var(--surf-c);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, #5B9EFF 100%);
      border-radius: 3px;
      transition: width .3s ease;
    }
    .prog-bot {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #progressCount { font-family: var(--mono); font-size: 11px; color: var(--muted2); }

    .btn-export {
      background: var(--green-c);
      color: var(--green);
      border: none;
      border-radius: 20px;
      font-family: var(--display);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .03em;
      padding: 5px 15px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-export:hover { background: #bce8d4; }

    /* ── Filter bar ───────────────────────────────────── */
    #filterBar {
      background: var(--surface);
      border: 1px solid var(--outline-v);
      border-radius: var(--r-lg);
      box-shadow: var(--sh0);
      padding: 10px 16px;
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .flabel {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
    }
    #filterBar select,
    #filterBar input[type=text] {
      background: var(--bg);
      border: 1.5px solid var(--outline);
      border-radius: 20px;
      color: var(--on-surface);
      font-family: var(--sans);
      font-size: 12.5px;
      padding: 4px 12px;
      outline: none;
      height: 30px;
      transition: border-color .18s, box-shadow .18s;
    }
    #filterBar select { cursor: pointer; }
    #filterBar select:focus,
    #filterBar input[type=text]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,98,212,.1);
    }
    #filterBar input[type=text] { width: 180px; }
    #filterBar input[type=text]::placeholder { color: var(--muted2); }

    .btn-clr {
      margin-left: auto;
      background: transparent;
      border: 1.5px solid var(--outline);
      border-radius: 20px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 4px 14px;
      cursor: pointer;
      height: 30px;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-clr:hover { border-color: var(--muted); color: var(--on-surface); background: var(--surf-v); }
    #filteredCount { font-family: var(--mono); font-size: 11px; color: var(--muted2); }

    /* ── Tabs card ────────────────────────────────────── */
    #tabsCard {
      background: var(--surface);
      border: 1px solid var(--outline-v);
      border-radius: var(--r-lg);
      box-shadow: var(--sh0);
      overflow: hidden;
    }
    #categoryTabs {
      display: flex;
      list-style: none;
      padding: 0 12px;
      margin: 0;
      border-bottom: 1px solid var(--outline-v);
      background: var(--surf-v);
      gap: 2px;
    }
    #categoryTabs .nav-item { list-style: none; }
    #categoryTabs .nav-link {
      display: block;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      color: var(--muted);
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .02em;
      padding: 11px 16px 9px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    #categoryTabs .nav-link:hover { color: var(--on-surface); }
    #categoryTabs .nav-link.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tcnt {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--outline-v);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      padding: 0 7px;
      min-width: 22px;
      height: 18px;
      margin-left: 7px;
    }
    #categoryTabs .nav-link.active .tcnt {
      background: var(--primary-c);
      color: var(--primary);
    }

    .tab-pane { display: none; }
    .tab-pane.show.active { display: block; }

    /* ── DataTables overrides ─────────────────────────── */
    .dataTables_wrapper {
      padding: 14px 18px;
      color: var(--on-surface);
      font-family: var(--sans);
      font-size: 13px;
    }
    .dataTables_wrapper .row { margin: 0; }
    .dataTables_wrapper .dataTables_length,
    .dataTables_wrapper .dataTables_filter { margin-bottom: 10px; }
    .dataTables_wrapper .dataTables_length label,
    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_info { color: var(--muted); font-size: 11.5px; }
    .dataTables_wrapper .dataTables_length select,
    .dataTables_wrapper .dataTables_filter input {
      background: var(--bg);
      border: 1.5px solid var(--outline) !important;
      border-radius: var(--r-sm);
      color: var(--on-surface);
      font-size: 12px;
      padding: 3px 9px;
      outline: none;
      box-shadow: none !important;
    }
    .dataTables_wrapper .dataTables_filter input:focus { border-color: var(--primary) !important; }
    .dataTables_wrapper .dataTables_paginate { margin-top: 10px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      background: none !important;
      border: 1.5px solid transparent !important;
      border-radius: 20px !important;
      color: var(--muted) !important;
      font-size: 12px !important;
      padding: 4px 12px !important;
      margin: 0 1px;
      cursor: pointer;
      transition: all .15s;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      color: var(--on-surface) !important;
      border-color: var(--outline) !important;
      background: var(--surf-v) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
      color: var(--primary) !important;
      border-color: var(--primary-c) !important;
      background: var(--primary-c) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
      color: var(--muted2) !important;
      cursor: default !important;
    }

    table.dataTable {
      border-collapse: collapse !important;
      width: 100% !important;
    }
    table.dataTable thead tr { background: var(--surf-v); }
    table.dataTable thead th {
      border-bottom: 1px solid var(--outline-v) !important;
      border-top: none !important;
      border-right: none !important;
      color: var(--muted);
      font-family: var(--display);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 10px 14px !important;
      white-space: nowrap;
      background: var(--surf-v);
    }
    table.dataTable thead th.sorting::before,
    table.dataTable thead th.sorting::after,
    table.dataTable thead th.sorting_asc::after,
    table.dataTable thead th.sorting_desc::after { opacity: .35; }

    table.dataTable tbody tr { background: transparent !important; }
    table.dataTable tbody tr td { border-bottom: 1px solid var(--outline-v) !important; }
    table.dataTable tbody tr:hover td { background: var(--surf-v) !important; }
    table.dataTable tbody td {
      padding: 10px 14px !important;
      border-right: none !important;
      border-top: none !important;
      vertical-align: middle;
      font-size: 13px;
    }

    /* Rank */
    table.dataTable tbody td:nth-child(1) {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      width: 58px;
    }
    /* Bib */
    table.dataTable tbody td:nth-child(2) {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted);
      width: 62px;
    }
    /* Name */
    table.dataTable tbody td:nth-child(3) { font-weight: 500; }
    /* Gender */
    table.dataTable tbody td:nth-child(4) { color: var(--muted); font-size: 12.5px; }
    /* Gun / Net times */
    table.dataTable tbody td:nth-child(6),
    table.dataTable tbody td:nth-child(7) {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .01em;
    }
    /* Gender rank */
    table.dataTable tbody td:nth-child(8) {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted);
    }

    /* Status chips */
    .status-Finisher {
      display: inline-flex; align-items: center;
      background: var(--green-c); color: var(--green);
      font-size: 10.5px; font-weight: 600;
      border-radius: 20px; padding: 2px 9px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .status-DNF {
      display: inline-flex; align-items: center;
      background: var(--red-c); color: var(--red);
      font-size: 10.5px; font-weight: 600;
      border-radius: 20px; padding: 2px 9px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .status-DNS {
      display: inline-flex; align-items: center;
      background: var(--gray-c); color: var(--muted);
      font-size: 10.5px; font-weight: 600;
      border-radius: 20px; padding: 2px 9px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .status-DQ {
      display: inline-flex; align-items: center;
      background: var(--orange-c); color: var(--orange);
      font-size: 10.5px; font-weight: 600;
      border-radius: 20px; padding: 2px 9px;
      letter-spacing: .04em; text-transform: uppercase;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--outline); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }
  </style>
</head>
<body>
<div class="page">

  <header class="hdr">
    <div class="hdr-mark">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M4 3v16M4 4h14l-3 4.5 3 4.5H4" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="hdr-title">Race <span>Results</span></div>
      <div class="hdr-sub">feibot.com scraper</div>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
      <svg id="themeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeLabel">Dark</span>
    </button>
  </header>

  <!-- Recent events -->
  <div id="recentSection" style="display:none">
    <p class="slabel">Recent Events</p>
    <div id="recentCards"></div>
  </div>

  <!-- Input panel -->
  <div class="panel" style="margin-top:4px">
    <div class="fields">
      <div class="f f-url">
        <label>Race URL</label>
        <input id="raceUrl" type="url" placeholder="https://time.feibot.com/live-wire/race-page/…">
      </div>
      <div class="f f-num">
        <label>Min Bib</label>
        <input id="minBib" type="number" value="1" min="1" max="99999">
      </div>
      <div class="f f-num">
        <label>Max Bib</label>
        <input id="maxBib" type="number" value="9999" min="1" max="99999">
      </div>
      <div class="f f-num">
        <label>Concurrency</label>
        <input id="concurrency" type="number" value="50" min="1" max="200">
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <button id="scrapeBtn" class="btn-primary-custom" onclick="startScrape()">Scrape</button>
        <button id="cancelBtn" class="btn-stop" style="display:none" onclick="cancelScrape()">Stop</button>
      </div>
    </div>
    <div id="errorMsg" style="display:none"></div>
  </div>

  <!-- Progress -->
  <div id="progressSection" style="display:none">
    <div class="prog-top">
      <span id="progressLabel">Scanning…</span>
      <span id="foundLabel">0 results</span>
    </div>
    <div class="prog-track"><div id="progressBar" style="width:0%"></div></div>
    <div class="prog-bot">
      <span id="progressCount">0 / 0</span>
      <button id="exportBtn" class="btn-export" style="display:none" onclick="exportCsv()">Export CSV</button>
    </div>
  </div>

  <!-- Filter bar (always in DOM) -->
  <div id="filterBar" style="display:none">
    <span class="flabel">Filter</span>
    <select id="filterGender" onchange="applyFilters()"><option value="">All Genders</option></select>
    <select id="filterStatus" onchange="applyFilters()"><option value="">All Statuses</option></select>
    <input id="nameSearch" type="text" placeholder="Name or bib…" oninput="applyFilters()">
    <button class="btn-clr" onclick="clearFilters()">Clear</button>
    <span id="filteredCount"></span>
  </div>

  <!-- Category tabs -->
  <div id="tabsCard" style="display:none">
    <ul id="categoryTabs" role="tablist"></ul>
    <div id="categoryTabContent"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
  const COL = { overallRank:0, bib:1, name:2, gender:3, status:4, gun:5, net:6, genderRank:7 };

  const tables = {};
  const counts = {};
  let tabGen = 0;
  let evtSource = null;
  let currentJobId = null;
  let loadedFromCache = false;
  const seen = { gender: new Set(), status: new Set() };

  // ── Custom filter ────────────────────────────────────────────────────────
  $.fn.dataTable.ext.search.push(function(_s, data) {
    const g = document.getElementById('filterGender').value.toLowerCase();
    const s = document.getElementById('filterStatus').value.toLowerCase();
    const n = document.getElementById('nameSearch').value.toLowerCase().trim();
    if (g && data[COL.gender].toLowerCase() !== g) return false;
    if (s && data[COL.status].replace(/<[^>]+>/g,'').toLowerCase() !== s) return false;
    if (n && !data[COL.name].toLowerCase().includes(n) && !String(data[COL.bib]).includes(n)) return false;
    return true;
  });

  // ── Reset ────────────────────────────────────────────────────────────────
  function resetAll() {
    Object.values(tables).forEach(t => { try { t.destroy(true); } catch(e) {} });
    Object.keys(tables).forEach(k => delete tables[k]);
    Object.keys(counts).forEach(k => delete counts[k]);
    tabGen++;
    document.getElementById('categoryTabs').innerHTML = '';
    document.getElementById('categoryTabContent').innerHTML = '';
    seen.gender.clear(); seen.status.clear();
    ['filterGender','filterStatus'].forEach(id => {
      const s = document.getElementById(id);
      while (s.options.length > 1) s.remove(1);
    });
    document.getElementById('nameSearch').value = '';
    document.getElementById('filteredCount').textContent = '';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('tabsCard').style.display = 'none';
  }

  // ── Create tab + table ───────────────────────────────────────────────────
  function createCategoryTab(eventName) {
    const safeId = `t${tabGen}_${eventName.replace(/\W/g,'_')}`;
    const isFirst = Object.keys(tables).length === 0;

    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<button class="nav-link${isFirst?' active':''}" id="btn-${safeId}"
      data-bs-toggle="tab" data-bs-target="#pane-${safeId}" type="button" role="tab">
      ${eventName}<span class="tcnt" id="badge-${safeId}">0</span>
    </button>`;
    document.getElementById('categoryTabs').appendChild(li);

    const pane = document.createElement('div');
    pane.className = `tab-pane fade${isFirst?' show active':''}`;
    pane.id = `pane-${safeId}`;
    pane.innerHTML = `<table id="tbl-${safeId}" class="w-100">
      <thead><tr>
        <th>Rank</th><th>Bib</th><th>Name</th><th>Gender</th><th>Status</th>
        <th>Gun Time</th><th>Net Time</th><th>Gender Rank</th>
      </tr></thead><tbody></tbody></table>`;
    document.getElementById('categoryTabContent').appendChild(pane);

    const dt = $(`#tbl-${safeId}`).DataTable({
      columns: [
        { data:'overall_gun_rank', type:'num', render: v => v ? (parseInt(v)||99999) : 99999 },
        { data:'bib' },
        { data:'name' },
        { data:'gender' },
        { data:'status', render: v => `<span class="status-${v||''}">${v||''}</span>` },
        { data:'gun_time' },
        { data:'net_time' },
        { data:'gender_gun_rank',  type:'num', render: v => v ? (parseInt(v)||99999) : 99999 },
      ],
      pageLength: 100,
      order: [[COL.overallRank,'asc']],
    });
    tables[eventName] = dt;
    counts[eventName] = 0;

    document.getElementById(`btn-${safeId}`).addEventListener('shown.bs.tab', () => {
      dt.columns.adjust().draw(false);
      updateFilteredCount();
    });
  }

  // ── Route results ────────────────────────────────────────────────────────
  function routeResults(rows) {
    const grouped = {};
    rows.forEach(r => { const ev = r.event||'Unknown'; (grouped[ev]=grouped[ev]||[]).push(r); });
    Object.entries(grouped).forEach(([ev, evRows]) => {
      if (!tables[ev]) createCategoryTab(ev);
      tables[ev].rows.add(evRows).draw(false);
      counts[ev] = (counts[ev]||0) + evRows.length;
      const badge = document.getElementById(`badge-t${tabGen}_${ev.replace(/\W/g,'_')}`);
      if (badge) badge.textContent = counts[ev];
    });
    document.getElementById('filterBar').style.display = '';
    document.getElementById('tabsCard').style.display = '';
    updateFilteredCount();
  }

  // ── Filters ──────────────────────────────────────────────────────────────
  function applyFilters() { Object.values(tables).forEach(t => t.draw(false)); updateFilteredCount(); }
  function clearFilters() {
    document.getElementById('filterGender').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('nameSearch').value = '';
    applyFilters();
  }
  function updateFilteredCount() {
    const pane = document.querySelector('#categoryTabContent .tab-pane.active');
    if (!pane) return;
    const tbl = pane.querySelector('table');
    if (!tbl || !$.fn.DataTable.isDataTable(tbl)) return;
    const info = $(tbl).DataTable().page.info();
    document.getElementById('filteredCount').textContent =
      info.recordsDisplay < info.recordsTotal
        ? `${info.recordsDisplay} of ${info.recordsTotal}`
        : `${info.recordsTotal} total`;
  }
  function updateDropdowns(results) {
    results.forEach(r => { addOpt('filterGender', seen.gender, r.gender); addOpt('filterStatus', seen.status, r.status); });
  }
  function addOpt(id, set, val) {
    if (!val || set.has(val)) return;
    set.add(val);
    const o = document.createElement('option');
    o.value = val.toLowerCase(); o.textContent = val;
    document.getElementById(id).appendChild(o);
  }

  // ── Scrape ───────────────────────────────────────────────────────────────
  function startScrape() {
    const url  = document.getElementById('raceUrl').value.trim();
    const minB = parseInt(document.getElementById('minBib').value)||1;
    const maxB = parseInt(document.getElementById('maxBib').value)||9999;
    const conc = parseInt(document.getElementById('concurrency').value)||50;
    if (!url) { showError('Please enter a race URL.'); return; }
    hideError(); resetAll(); loadedFromCache = false;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('scrapeBtn').disabled = true;
    document.getElementById('cancelBtn').style.display = 'inline-block';
    setProgress(0, maxB-minB+1, 0);
    fetch('/scrape', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url, min_bib:minB, max_bib:maxB, concurrency:conc}) })
    .then(r=>r.json()).then(({job_id, error}) => {
      if (error) { showError(error); resetControls(); return; }
      currentJobId = job_id;
      evtSource = new EventSource(`/progress/${job_id}`);
      evtSource.onmessage = onProgress;
      evtSource.onerror = () => { evtSource.close(); resetControls(); };
    }).catch(e => { showError(e.message); resetControls(); });
  }

  function onProgress(e) {
    const d = JSON.parse(e.data);
    if (d.error) { showError(d.error); evtSource.close(); resetControls(); return; }
    setProgress(d.progress, d.total, d.found);
    if (d.new_results && d.new_results.length) { updateDropdowns(d.new_results); routeResults(d.new_results); }
    if (d.done) {
      evtSource.close();
      document.getElementById('progressLabel').textContent = 'Complete';
      document.getElementById('exportBtn').style.display = 'inline-block';
      resetControls(); loadRecentEvents();
    }
  }

  function setProgress(progress, total, found) {
    const pct = total > 0 ? Math.round(progress/total*100) : 0;
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('progressCount').textContent =
      `${progress.toLocaleString()} / ${total.toLocaleString()}`;
    document.getElementById('foundLabel').textContent =
      `${found} result${found!==1?'s':''}`;
  }

  function cancelScrape() {
    if (currentJobId) fetch(`/cancel/${currentJobId}`,{method:'POST'});
    if (evtSource) evtSource.close();
    document.getElementById('progressLabel').textContent = 'Cancelled';
    resetControls();
  }
  function exportCsv() {
    if (!currentJobId) return;
    window.location = loadedFromCache ? `/export/cache/${currentJobId}.csv` : `/export/${currentJobId}.csv`;
  }
  function resetControls() {
    document.getElementById('scrapeBtn').disabled = false;
    document.getElementById('cancelBtn').style.display = 'none';
  }
  function showError(msg) { const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; }
  function hideError() { document.getElementById('errorMsg').style.display='none'; }

  // ── Cache ────────────────────────────────────────────────────────────────
  function loadRecentEvents(autoLoad) {
    fetch('/cache').then(r=>r.json()).then(events => {
      const c = document.getElementById('recentCards');
      c.innerHTML = '';
      if (!events.length) return;
      events.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'rc';
        card.innerHTML = `
          <div class="rc-name" title="${ev.race_name}">${ev.race_name}</div>
          <div class="rc-meta">${ev.scraped_at} &middot; ${ev.count} results</div>
          <div>${(ev.categories||[]).map(c=>`<span class="rc-badge">${c}</span>`).join('')}</div>`;
        card.addEventListener('click', () => loadFromCache(ev.race_id));
        c.appendChild(card);
      });
      document.getElementById('recentSection').style.display = '';
      if (autoLoad) loadFromCache(events[0].race_id);
    }).catch(()=>{});
  }

  function loadFromCache(raceId) {
    hideError(); resetAll();
    loadedFromCache = true; currentJobId = raceId;
    fetch(`/cache/${raceId}`).then(r=>r.json()).then(entry => {
      if (entry.error) { showError(entry.error); return; }
      document.getElementById('raceUrl').value = entry.url;
      document.getElementById('progressSection').style.display = 'none';
      updateDropdowns(entry.results);
      routeResults(entry.results);
      document.getElementById('exportBtn').style.display = 'inline-block';
    }).catch(e => showError(e.message));
  }

  window.addEventListener('load', () => loadRecentEvents(true));

  // ── Theme ─────────────────────────────────────────────────────────────────
  const SUN = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  const MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('themeIcon').innerHTML = dark ? SUN : MOON;
    document.getElementById('themeLabel').textContent = dark ? 'Light' : 'Dark';
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefersDark);
  })();
</script>
</body>
</html>
