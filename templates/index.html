<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
  <style>
    :root {
      --bg:       #0c0c0c;
      --s1:       #141414;
      --s2:       #1c1c1c;
      --b1:       #242424;
      --b2:       #333;
      --text:     #e0e0e0;
      --muted:    #5a5a5a;
      --muted2:   #888;
      --accent:   #e8a020;
      --acc-dim:  #7a5510;
      --acc-bg:   rgba(232,160,32,.07);
      --green:    #22c55e;
      --red:      #ef4444;
      --gray:     #555;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Barlow', sans-serif;
      --cond:     'Barlow Condensed', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page wrapper ─────────────────────────────────── */
    .page { max-width: 1280px; margin: 0 auto; padding: 44px 28px 100px; }

    /* ── Header ───────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--b1);
      margin-bottom: 36px;
    }
    .hdr-title {
      font-family: var(--cond);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: var(--text);
    }
    .hdr-title em { font-style: normal; color: var(--accent); }
    .hdr-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Section label ────────────────────────────────── */
    .slabel {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Recent events ─────────────────────────────────── */
    #recentSection { margin-bottom: 28px; }
    #recentCards { display: flex; flex-wrap: wrap; gap: 8px; }

    .rc {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 6px;
      padding: 11px 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      min-width: 180px;
      max-width: 270px;
    }
    .rc:hover { border-color: var(--accent); background: var(--s2); }
    .rc-name {
      font-family: var(--cond);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .rc-meta { font-size: 11px; color: var(--muted2); margin-bottom: 6px; }
    .rc-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      background: var(--acc-bg);
      border: 1px solid var(--acc-dim);
      border-radius: 3px;
      padding: 1px 6px;
      margin-right: 4px;
    }

    /* ── Input panel ──────────────────────────────────── */
    .panel {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .fields { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .f { display: flex; flex-direction: column; gap: 5px; }
    .f-url  { flex: 1 1 280px; }
    .f-num  { flex: 0 0 96px; }
    .f label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .f input {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .f input:focus { border-color: var(--accent); }
    .f input::placeholder { color: var(--muted); }
    .f input[type=number] { -moz-appearance: textfield; }
    .f input[type=number]::-webkit-outer-spin-button,
    .f input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn-primary-custom {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: var(--cond);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 8px 22px;
      cursor: pointer;
      transition: opacity .15s;
      height: 36px;
    }
    .btn-primary-custom:hover:not(:disabled) { opacity: .82; }
    .btn-primary-custom:disabled { opacity: .35; cursor: not-allowed; }

    .btn-stop {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 5px;
      font-family: var(--cond);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 7px 16px;
      cursor: pointer;
      height: 36px;
      transition: background .15s;
    }
    .btn-stop:hover { background: rgba(239,68,68,.08); }

    #errorMsg {
      margin-top: 12px;
      padding: 9px 13px;
      background: rgba(239,68,68,.07);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 5px;
      font-size: 12px;
      color: #f87171;
    }

    /* ── Progress ─────────────────────────────────────── */
    #progressSection {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 14px;
    }
    .prog-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }
    #progressLabel {
      font-family: var(--cond);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted2);
    }
    #foundLabel {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }
    .prog-track {
      height: 2px;
      background: var(--b2);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 9px;
    }
    #progressBar {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width .25s ease;
    }
    .prog-bot {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #progressCount { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .btn-export {
      background: transparent;
      color: var(--green);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 4px;
      font-family: var(--cond);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 4px 13px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-export:hover { background: rgba(34,197,94,.07); border-color: var(--green); }

    /* ── Filter bar ───────────────────────────────────── */
    #filterBar {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .flabel {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #filterBar select,
    #filterBar input[type=text] {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      padding: 4px 9px;
      outline: none;
      transition: border-color .15s;
      height: 28px;
    }
    #filterBar select { cursor: pointer; }
    #filterBar select:focus,
    #filterBar input[type=text]:focus { border-color: var(--accent); }
    #filterBar input[type=text] { width: 170px; }
    #filterBar input[type=text]::placeholder { color: var(--muted); }

    .btn-clr {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--b2);
      border-radius: 4px;
      color: var(--muted2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 12px;
      cursor: pointer;
      height: 28px;
      transition: border-color .15s, color .15s;
    }
    .btn-clr:hover { border-color: var(--muted2); color: var(--text); }
    #filteredCount { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── Tabs card ────────────────────────────────────── */
    #tabsCard {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      overflow: hidden;
    }
    #categoryTabs {
      display: flex;
      list-style: none;
      padding: 0 12px;
      margin: 0;
      border-bottom: 1px solid var(--b1);
      background: var(--s1);
    }
    #categoryTabs .nav-item { list-style: none; }
    #categoryTabs .nav-link {
      display: block;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted2);
      font-family: var(--cond);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 11px 14px 9px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    #categoryTabs .nav-link:hover { color: var(--text); }
    #categoryTabs .nav-link.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tcnt {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 6px;
    }
    #categoryTabs .nav-link.active .tcnt { color: var(--acc-dim); }

    .tab-pane { display: none; }
    .tab-pane.show.active { display: block; }

    /* ── DataTables ───────────────────────────────────── */
    .dataTables_wrapper {
      padding: 14px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
    }
    .dataTables_wrapper .row { margin: 0; }
    .dataTables_wrapper .dataTables_length,
    .dataTables_wrapper .dataTables_filter { margin-bottom: 10px; }
    .dataTables_wrapper .dataTables_length label,
    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_info { color: var(--muted); font-size: 11px; }
    .dataTables_wrapper .dataTables_length select,
    .dataTables_wrapper .dataTables_filter input {
      background: var(--s2);
      border: 1px solid var(--b2) !important;
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 8px;
      outline: none;
      box-shadow: none !important;
    }
    .dataTables_wrapper .dataTables_filter input:focus { border-color: var(--accent) !important; }
    .dataTables_wrapper .dataTables_paginate { margin-top: 10px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      background: none !important;
      border: 1px solid transparent !important;
      border-radius: 4px !important;
      color: var(--muted2) !important;
      font-size: 11px !important;
      padding: 3px 9px !important;
      margin: 0 1px;
      cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      color: var(--text) !important;
      border-color: var(--b2) !important;
      background: var(--s2) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
      color: var(--accent) !important;
      border-color: var(--acc-dim) !important;
      background: var(--acc-bg) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
      color: var(--b2) !important;
      cursor: default !important;
    }

    table.dataTable {
      border-collapse: collapse !important;
      width: 100% !important;
    }
    table.dataTable thead tr { background: var(--s2); }
    table.dataTable thead th {
      border-bottom: 1px solid var(--b2) !important;
      border-top: none !important;
      border-right: none !important;
      color: var(--muted);
      font-family: var(--cond);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 9px 12px !important;
      white-space: nowrap;
      background: var(--s2);
    }
    table.dataTable thead th.sorting::before,
    table.dataTable thead th.sorting::after,
    table.dataTable thead th.sorting_asc::after,
    table.dataTable thead th.sorting_desc::after { opacity: .3; }

    table.dataTable tbody tr { background: transparent !important; }
    table.dataTable tbody tr td { border-bottom: 1px solid var(--b1) !important; }
    table.dataTable tbody tr:hover td { background: var(--s2) !important; }
    table.dataTable tbody td {
      padding: 8px 12px !important;
      border-right: none !important;
      border-top: none !important;
      vertical-align: middle;
      font-size: 13px;
    }

    /* Bib */
    table.dataTable tbody td:nth-child(1) {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      width: 60px;
    }
    /* Name */
    table.dataTable tbody td:nth-child(2) { font-weight: 500; }
    /* Gender */
    table.dataTable tbody td:nth-child(3) { color: var(--muted2); font-size: 12px; }
    /* Gun / Net times */
    table.dataTable tbody td:nth-child(5),
    table.dataTable tbody td:nth-child(6) {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .02em;
    }
    /* Overall rank */
    table.dataTable tbody td:nth-child(7) {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
    }
    /* Gender rank */
    table.dataTable tbody td:nth-child(8) {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
    }

    /* Status */
    .status-Finisher { color: var(--green); font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .status-DNF      { color: var(--red);   font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
    .status-DNS      { color: var(--gray);  font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
    .status-DQ       { color: #f97316;      font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
<div class="page">

  <header class="hdr">
    <h1 class="hdr-title">Race <em>Results</em></h1>
    <span class="hdr-sub">feibot.com scraper</span>
  </header>

  <!-- Recent events -->
  <div id="recentSection" style="display:none">
    <p class="slabel">Recent Events</p>
    <div id="recentCards"></div>
  </div>

  <!-- Input panel -->
  <div class="panel" style="margin-top:4px">
    <div class="fields">
      <div class="f f-url">
        <label>Race URL</label>
        <input id="raceUrl" type="url" placeholder="https://time.feibot.com/live-wire/race-page/…">
      </div>
      <div class="f f-num">
        <label>Min Bib</label>
        <input id="minBib" type="number" value="1" min="1" max="99999">
      </div>
      <div class="f f-num">
        <label>Max Bib</label>
        <input id="maxBib" type="number" value="9999" min="1" max="99999">
      </div>
      <div class="f f-num">
        <label>Concurrency</label>
        <input id="concurrency" type="number" value="50" min="1" max="200">
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:0">
        <button id="scrapeBtn" class="btn-primary-custom" onclick="startScrape()">Scrape</button>
        <button id="cancelBtn" class="btn-stop" style="display:none" onclick="cancelScrape()">Stop</button>
      </div>
    </div>
    <div id="errorMsg" style="display:none"></div>
  </div>

  <!-- Progress -->
  <div id="progressSection" style="display:none">
    <div class="prog-top">
      <span id="progressLabel">Scanning…</span>
      <span id="foundLabel">0 results</span>
    </div>
    <div class="prog-track"><div id="progressBar" style="width:0%"></div></div>
    <div class="prog-bot">
      <span id="progressCount">0 / 0</span>
      <button id="exportBtn" class="btn-export" style="display:none" onclick="exportCsv()">Export CSV</button>
    </div>
  </div>

  <!-- Filter bar (always in DOM) -->
  <div id="filterBar" style="display:none">
    <span class="flabel">Filter</span>
    <select id="filterGender" onchange="applyFilters()"><option value="">All Genders</option></select>
    <select id="filterStatus" onchange="applyFilters()"><option value="">All Statuses</option></select>
    <input id="nameSearch" type="text" placeholder="Name or bib…" oninput="applyFilters()">
    <button class="btn-clr" onclick="clearFilters()">Clear</button>
    <span id="filteredCount"></span>
  </div>

  <!-- Category tabs -->
  <div id="tabsCard" style="display:none">
    <ul id="categoryTabs" role="tablist"></ul>
    <div id="categoryTabContent"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
  const COL = { overallRank:0, bib:1, name:2, gender:3, status:4, gun:5, net:6, genderRank:7 };

  const tables = {};
  const counts = {};
  let tabGen = 0;
  let evtSource = null;
  let currentJobId = null;
  let loadedFromCache = false;
  const seen = { gender: new Set(), status: new Set() };

  // ── Custom filter ────────────────────────────────────────────────────────
  $.fn.dataTable.ext.search.push(function(_s, data) {
    const g = document.getElementById('filterGender').value.toLowerCase();
    const s = document.getElementById('filterStatus').value.toLowerCase();
    const n = document.getElementById('nameSearch').value.toLowerCase().trim();
    if (g && data[COL.gender].toLowerCase() !== g) return false;
    if (s && data[COL.status].replace(/<[^>]+>/g,'').toLowerCase() !== s) return false;
    if (n && !data[COL.name].toLowerCase().includes(n) && !String(data[COL.bib]).includes(n)) return false;
    return true;
  });

  // ── Reset ────────────────────────────────────────────────────────────────
  function resetAll() {
    Object.values(tables).forEach(t => { try { t.destroy(true); } catch(e) {} });
    Object.keys(tables).forEach(k => delete tables[k]);
    Object.keys(counts).forEach(k => delete counts[k]);
    tabGen++;
    document.getElementById('categoryTabs').innerHTML = '';
    document.getElementById('categoryTabContent').innerHTML = '';
    seen.gender.clear(); seen.status.clear();
    ['filterGender','filterStatus'].forEach(id => {
      const s = document.getElementById(id);
      while (s.options.length > 1) s.remove(1);
    });
    document.getElementById('nameSearch').value = '';
    document.getElementById('filteredCount').textContent = '';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('tabsCard').style.display = 'none';
  }

  // ── Create tab + table ───────────────────────────────────────────────────
  function createCategoryTab(eventName) {
    const safeId = `t${tabGen}_${eventName.replace(/\W/g,'_')}`;
    const isFirst = Object.keys(tables).length === 0;

    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<button class="nav-link${isFirst?' active':''}" id="btn-${safeId}"
      data-bs-toggle="tab" data-bs-target="#pane-${safeId}" type="button" role="tab">
      ${eventName}<span class="tcnt" id="badge-${safeId}">0</span>
    </button>`;
    document.getElementById('categoryTabs').appendChild(li);

    const pane = document.createElement('div');
    pane.className = `tab-pane fade${isFirst?' show active':''}`;
    pane.id = `pane-${safeId}`;
    pane.innerHTML = `<table id="tbl-${safeId}" class="w-100">
      <thead><tr>
        <th>Rank</th><th>Bib</th><th>Name</th><th>Gender</th><th>Status</th>
        <th>Gun Time</th><th>Net Time</th><th>Gender Rank</th>
      </tr></thead><tbody></tbody></table>`;
    document.getElementById('categoryTabContent').appendChild(pane);

    const dt = $(`#tbl-${safeId}`).DataTable({
      columns: [
        { data:'overall_gun_rank', type:'num', render: v => v ? (parseInt(v)||99999) : 99999 },
        { data:'bib' },
        { data:'name' },
        { data:'gender' },
        { data:'status', render: v => `<span class="status-${v||''}">${v||''}</span>` },
        { data:'gun_time' },
        { data:'net_time' },
        { data:'gender_gun_rank',  type:'num', render: v => v ? (parseInt(v)||99999) : 99999 },
      ],
      pageLength: 100,
      order: [[COL.overallRank,'asc']],
    });
    tables[eventName] = dt;
    counts[eventName] = 0;

    document.getElementById(`btn-${safeId}`).addEventListener('shown.bs.tab', () => {
      dt.columns.adjust().draw(false);
      updateFilteredCount();
    });
  }

  // ── Route results ────────────────────────────────────────────────────────
  function routeResults(rows) {
    const grouped = {};
    rows.forEach(r => { const ev = r.event||'Unknown'; (grouped[ev]=grouped[ev]||[]).push(r); });
    Object.entries(grouped).forEach(([ev, evRows]) => {
      if (!tables[ev]) createCategoryTab(ev);
      tables[ev].rows.add(evRows).draw(false);
      counts[ev] = (counts[ev]||0) + evRows.length;
      const badge = document.getElementById(`badge-t${tabGen}_${ev.replace(/\W/g,'_')}`);
      if (badge) badge.textContent = counts[ev];
    });
    document.getElementById('filterBar').style.display = '';
    document.getElementById('tabsCard').style.display = '';
    updateFilteredCount();
  }

  // ── Filters ──────────────────────────────────────────────────────────────
  function applyFilters() { Object.values(tables).forEach(t => t.draw(false)); updateFilteredCount(); }
  function clearFilters() {
    document.getElementById('filterGender').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('nameSearch').value = '';
    applyFilters();
  }
  function updateFilteredCount() {
    const pane = document.querySelector('#categoryTabContent .tab-pane.active');
    if (!pane) return;
    const tbl = pane.querySelector('table');
    if (!tbl || !$.fn.DataTable.isDataTable(tbl)) return;
    const info = $(tbl).DataTable().page.info();
    document.getElementById('filteredCount').textContent =
      info.recordsDisplay < info.recordsTotal
        ? `${info.recordsDisplay} of ${info.recordsTotal}`
        : `${info.recordsTotal} total`;
  }
  function updateDropdowns(results) {
    results.forEach(r => { addOpt('filterGender', seen.gender, r.gender); addOpt('filterStatus', seen.status, r.status); });
  }
  function addOpt(id, set, val) {
    if (!val || set.has(val)) return;
    set.add(val);
    const o = document.createElement('option');
    o.value = val.toLowerCase(); o.textContent = val;
    document.getElementById(id).appendChild(o);
  }

  // ── Scrape ───────────────────────────────────────────────────────────────
  function startScrape() {
    const url  = document.getElementById('raceUrl').value.trim();
    const minB = parseInt(document.getElementById('minBib').value)||1;
    const maxB = parseInt(document.getElementById('maxBib').value)||9999;
    const conc = parseInt(document.getElementById('concurrency').value)||50;
    if (!url) { showError('Please enter a race URL.'); return; }
    hideError(); resetAll(); loadedFromCache = false;
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('scrapeBtn').disabled = true;
    document.getElementById('cancelBtn').style.display = 'inline-block';
    setProgress(0, maxB-minB+1, 0);
    fetch('/scrape', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url, min_bib:minB, max_bib:maxB, concurrency:conc}) })
    .then(r=>r.json()).then(({job_id, error}) => {
      if (error) { showError(error); resetControls(); return; }
      currentJobId = job_id;
      evtSource = new EventSource(`/progress/${job_id}`);
      evtSource.onmessage = onProgress;
      evtSource.onerror = () => { evtSource.close(); resetControls(); };
    }).catch(e => { showError(e.message); resetControls(); });
  }

  function onProgress(e) {
    const d = JSON.parse(e.data);
    if (d.error) { showError(d.error); evtSource.close(); resetControls(); return; }
    setProgress(d.progress, d.total, d.found);
    if (d.new_results && d.new_results.length) { updateDropdowns(d.new_results); routeResults(d.new_results); }
    if (d.done) {
      evtSource.close();
      document.getElementById('progressLabel').textContent = 'Complete';
      document.getElementById('exportBtn').style.display = 'inline-block';
      resetControls(); loadRecentEvents();
    }
  }

  function setProgress(progress, total, found) {
    const pct = total > 0 ? Math.round(progress/total*100) : 0;
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('progressCount').textContent =
      `${progress.toLocaleString()} / ${total.toLocaleString()}`;
    document.getElementById('foundLabel').textContent =
      `${found} result${found!==1?'s':''}`;
  }

  function cancelScrape() {
    if (currentJobId) fetch(`/cancel/${currentJobId}`,{method:'POST'});
    if (evtSource) evtSource.close();
    document.getElementById('progressLabel').textContent = 'Cancelled';
    resetControls();
  }
  function exportCsv() {
    if (!currentJobId) return;
    window.location = loadedFromCache ? `/export/cache/${currentJobId}.csv` : `/export/${currentJobId}.csv`;
  }
  function resetControls() {
    document.getElementById('scrapeBtn').disabled = false;
    document.getElementById('cancelBtn').style.display = 'none';
  }
  function showError(msg) { const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; }
  function hideError() { document.getElementById('errorMsg').style.display='none'; }

  // ── Cache ────────────────────────────────────────────────────────────────
  function loadRecentEvents(autoLoad) {
    fetch('/cache').then(r=>r.json()).then(events => {
      const c = document.getElementById('recentCards');
      c.innerHTML = '';
      if (!events.length) return;
      events.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'rc';
        card.innerHTML = `
          <div class="rc-name" title="${ev.race_name}">${ev.race_name}</div>
          <div class="rc-meta">${ev.scraped_at} &middot; ${ev.count} results</div>
          <div>${(ev.categories||[]).map(c=>`<span class="rc-badge">${c}</span>`).join('')}</div>`;
        card.addEventListener('click', () => loadFromCache(ev.race_id));
        c.appendChild(card);
      });
      document.getElementById('recentSection').style.display = '';
      if (autoLoad) loadFromCache(events[0].race_id);
    }).catch(()=>{});
  }

  function loadFromCache(raceId) {
    hideError(); resetAll();
    loadedFromCache = true; currentJobId = raceId;
    fetch(`/cache/${raceId}`).then(r=>r.json()).then(entry => {
      if (entry.error) { showError(entry.error); return; }
      document.getElementById('raceUrl').value = entry.url;
      document.getElementById('progressSection').style.display = 'none';
      updateDropdowns(entry.results);
      routeResults(entry.results);
      document.getElementById('exportBtn').style.display = 'inline-block';
    }).catch(e => showError(e.message));
  }

  window.addEventListener('load', () => loadRecentEvents(true));
</script>
</body>
</html>
